<!-- 
    Assignment 2: Modify a leaflet web map
    In this assignment you will start with a working web map, and then modify and add to it.

    Task:

    1. Replace the tile layer with a different one.
    hint: use the Leaflet Providers page to find one: https://leaflet-extras.github.io/leaflet-providers/preview/
    2. Add new markers to the map at three of your favorite locations around Duluth.
    - Each marker should have a popup that includes the name of the location and a fun fact about it.
    - At least one of the markers should have an image or video in the popup.
    - You can remove the existing marker for the UMD campus if you want.
    3. Center the map on Duluth (change the zoom level as well if you want).
    4. Modify the title and subtitle to reflect your name and the theme of your map.
    5. Add a paragraph to the paragraph describing your map and the locations you added.
    6. Modify the style of each of the elements (header, paragraph, and map) to your liking.
    - At a minimum, remove the inline style on the map div and add your own CSS to the style tag in the head of the document.

    AI use: you can ask questions of AI (such as "explain what this line of code does" or "how do I create a popup in Leaflet?") 
    But try and write the code yourself. 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jared's Favorite Places in Duluth, MN</title>
    
    <!-- Leaflet CSS stylesheet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>body{width: 900px; height: 900px;} #map{width: 90%; height: 90%; }</style>
</head>
<body>
    <!-- Header at the top of the page -->
    <div class="header"> <style>h1{font-family: fantasy; color: cornflowerblue};</style>
        <h1>Jared's Favorite Places in Duluth, MN</h1>
        
        <h3>by: Jared Lehrer</h3>
    </div>
    <div id="map"></div>
    
    <!-- Leaflet JavaScript library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Initialize the map, center it on UMD campus, and set the zoom level
        const map = L.map('map').setView([46.82, -92.08], 13);

        // Add OpenStreetMap tiles
       var CartoDB_Voyager = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
	attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
	subdomains: 'abcd',
	maxZoom: 20
});
// actually add the tiles to the map
CartoDB_Voyager.addTo(map);

        // Add a marker for the UMD campus
        const marker = L.marker([46.82, -92.085]).addTo(map);
        //  the HTML content for my popup
        const htmlContent = `
        <div>
            <h4>Aerial Photo of University of Minnesota Duluth</h4>
            <img width=295 height=150 src="https://admissions.d.umn.edu/sites/admissions.d.umn.edu/files/2024-08/aerial_view_umd_campus.png">
            <em>Photo courtesy of UMD Admissions Office</em>
        </div>
    `;

        marker.bindPopup("<b>University of Minnesota Duluth</b><br>A great place to learn about GIS!"+ htmlContent)
            marker.openPopup();

const pierMarker = L.marker([46.779971, -92.091187]).addTo(map);

const pierPopupContent = `
<div>
    <h3>Duluth Shipping Pier</h3>
    <p>Best place to watch ships come into Duluth!</p>
</div>
`;

pierMarker.bindPopup(pierPopupContent);

    </script>
</body>
</html>
